allow-lan: true
mode: rule
log-level: warning
ipv6: false

keep-alive-interval: 15
keep-alive-idle: 15
disable-keep-alive: false

find-process-mode: strict

proxy-providers:

  zieng2@provider:
    type: http
    path: ./providers/zieng2@provider.yaml
    url: https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt
    interval: 14400

    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 604800
      timeout: 2000

    override:
      udp: true
      ip-version: ipv4-prefer

    exclude-filter: Yandex|Majordomo|cloud.ru
    exclude-type: ss|trojan

redir-port: 7893
tproxy-port: 7894

unified-delay: false
tcp-concurrent: true

profile:
  store-selected: true

sniffer:
  enable: true
  cache-algorithm: arc
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
    TLS:

dns:
  enable: true
  ipv6: false
  default-nameserver:
    - tls://77.88.8.8
  nameserver:
    - tls://77.88.8.8
  fallback:
    - tls://77.88.8.8
  proxy-server-nameserver:
    - tls://77.88.8.8
  direct-nameserver:
    - dhcp://system

proxy-groups:

  - name: Выберите режим
    type: select
    proxies:
      - Авто (быстрый)
      - Авто (живой)
    exclude-type: DIRECT
    url: https://www.gstatic.com/generate_204
    interval: 60
    timeout: 1500
    max-failed-times: 2

  - name: Авто (быстрый)
    type: url-test
    hidden: true
    include-all: true
    exclude-type: DIRECT
    url: https://www.gstatic.com/generate_204
    tolerance: 100

  - name: Авто (живой)
    type: fallback
    hidden: true
    include-all: true
    exclude-type: DIRECT
    url: https://www.gstatic.com/generate_204

rule-providers:
  block@other:
    type: http
    path: ./rulesets/block@other.yaml
    url: https://github.com/tobedeclared/mihomo/raw/main/rules/other/block@other.yaml
    interval: 259200 # 72 часа
    behavior: classical
    format: yaml

  sds@processes:
    type: http
    path: ./rulesets/sds@processes.yaml
    url: https://github.com/tobedeclared/mihomo/raw/main/rules/processes/sds@processes.yaml
    interval: 259200
    behavior: classical
    format: yaml

  sds@ipcidr:
    type: http
    path: ./rulesets/sds@ipcidr.yaml
    url: https://github.com/tobedeclared/mihomo/raw/main/rules/ipcidr/sds@ipcidr.mrs
    interval: 259200
    behavior: ipcidr
    format: mrs
  
  sds@domains:
    type: http
    path: ./rulesets/sds@domains.yaml
    url: https://github.com/tobedeclared/mihomo/raw/main/rules/domains/sds@domains.mrs
    interval: 259200
    behavior: domain
    format: mrs

rules:
  - RULE-SET,block@other,REJECT
  - RULE-SET,sds@processes,DIRECT
  - RULE-SET,sds@ipcidr,DIRECT
  - RULE-SET,sds@domains,DIRECT
  - MATCH,Выберите режим